name: compneuro_env
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy=1.26.4
  - scipy=1.13.0
  - pandas=2.2.2
  - matplotlib=3.8.4
  - seaborn=0.13.2
  - scikit-learn=1.5.0
  - tqdm=4.66.4
  - pyyaml=6.0.1
  - h5py=3.11.0
  - pytest=8.2.2
  - networkx=3.3
  - joblib=1.4.2
  - pip
  - pip:
      - torch==2.3.0
      - torchvision==0.18.0
      - tensorboard==2.17.0
      - mne==1.7.1
      - brian2==2.7.1
      - powerlaw==1.5
      - pytest-cov==5.0.0
